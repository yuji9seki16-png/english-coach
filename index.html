<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Coach — Alex</title>
    <style>
        :root {
            --bg: #f5f5f0;
            --surface: #ffffff;
            --primary: #2d6a4f;
            --primary-light: #e8f5e9;
            --border: #e0e0e0;
            --muted: #999;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            max-width: 640px;
            margin: 0 auto;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title { font-size: 17px; font-weight: 700; color: var(--primary); }
        .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

        .settings-btn {
            background: none; border: none; cursor: pointer;
            color: var(--muted); font-size: 20px; padding: 4px;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .welcome {
            text-align: center;
            color: var(--muted);
            padding: 32px 16px;
        }
        .welcome h2 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
        .welcome p { font-size: 14px; line-height: 1.6; }

        .message { display: flex; flex-direction: column; max-width: 85%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.ai   { align-self: flex-start; align-items: flex-start; }

        .sender { font-size: 11px; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }

        .bubble {
            padding: 11px 15px;
            border-radius: 18px;
            line-height: 1.65;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.ai .bubble {
            background: var(--surface);
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }

        .typing { display: flex; gap: 5px; padding: 14px 16px; }
        .typing span {
            width: 8px; height: 8px;
            background: var(--border);
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.18s; }
        .typing span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-7px); }
        }

        footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 14px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            flex-shrink: 0;
        }

        .input-row { display: flex; gap: 8px; align-items: flex-end; }

        #userInput {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 10px 15px;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            background: var(--bg);
            line-height: 1.4;
        }
        #userInput:focus { border-color: var(--primary); }

        .icon-btn {
            width: 42px; height: 42px;
            border-radius: 50%; border: none;
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; transition: all 0.15s;
        }

        #micBtn { background: var(--primary-light); color: var(--primary); }
        #micBtn.listening { background: #ffebee; color: #c62828; animation: pulse 0.9s infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        #sendBtn { background: var(--primary); color: #fff; }
        #sendBtn:disabled { background: var(--border); cursor: default; }

        /* Modal */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 200; align-items: center; justify-content: center; padding: 20px;
        }
        .overlay.open { display: flex; }

        .modal {
            background: #fff; border-radius: 16px;
            padding: 24px; width: 100%; max-width: 380px;
        }
        .modal h2 { font-size: 17px; margin-bottom: 18px; }

        .field label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; }
        .field input, .field select {
            width: 100%; border: 1px solid var(--border);
            border-radius: 8px; padding: 9px 12px;
            font-size: 14px; margin-bottom: 14px;
        }

        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
        .btn-cancel { background: none; border: none; cursor: pointer; color: var(--muted); padding: 8px 12px; font-size: 14px; }
        .btn-save {
            background: var(--primary); color: #fff;
            border: none; border-radius: 8px;
            padding: 8px 20px; font-size: 14px; cursor: pointer;
        }

        .level-badge {
            display: inline-block;
            font-size: 11px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 10px;
            padding: 2px 8px;
            margin-left: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <div>
        <div class="header-title">
            English Coach
            <span class="level-badge" id="levelBadge">Level 1</span>
        </div>
        <div class="header-sub" id="headerSub">Alex • study abroad prep</div>
    </div>
    <button class="settings-btn" onclick="openSettings()">⚙️</button>
</header>

<div id="chat">
    <div class="welcome" id="welcomeMsg">
        <h2>Hi, Makoto! 👋</h2>
        <p>I'm Alex, your English coach.<br>Let's practice every day and get ready<br>for your study abroad!</p>
    </div>
</div>

<footer>
    <div class="input-row">
        <textarea id="userInput" placeholder="Speak 🎤 or type here..." rows="1"
            onkeydown="handleKey(event)" oninput="handleInput(this)"></textarea>
        <button class="icon-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
</footer>

<div class="overlay" id="settingsModal">
    <div class="modal">
        <h2>⚙️ Settings</h2>
        <div class="field">
            <label>Groq API Key</label>
            <input type="password" id="apiKeyInput" placeholder="gsk_..." autocomplete="off" />
        </div>
        <div class="field">
            <label>Level</label>
            <select id="levelSelect">
                <option value="1">Level 1 — Beginner (simple daily chat)</option>
                <option value="2">Level 2 — Elementary (opinions & stories)</option>
                <option value="3">Level 3 — Intermediate (culture & debate)</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
            <button class="btn-save" onclick="saveSettings()">Save</button>
        </div>
    </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let apiKey  = localStorage.getItem('eng_coach_key') || '';
let level   = parseInt(localStorage.getItem('eng_coach_level') || '1');
let history = []; // {role, parts:[{text}]}
let recognition = null;
let isListening = false;
let msgCount = 0;

// ── System prompt ──────────────────────────────────────────────────────────
function buildSystemPrompt() {
    const levels = {
        1: `You are Alex, a warm English coach for Makoto, a Japanese high school freshman (age ~15).
LEVEL 1 — Beginner:
- Use simple, clear sentences. Short words. Common vocabulary.
- Topics: greetings, daily schedule, hobbies, food, family, school life.
- Gently correct mistakes: "Nice! We'd usually say '...' — sounds more natural 😊"
- Keep your reply under 80 words.`,
        2: `You are Alex, a warm English coach for Makoto, a Japanese high school freshman (age ~15).
LEVEL 2 — Elementary:
- Use slightly more complex sentences. Introduce idioms occasionally.
- Topics: opinions, weekend plans, describing experiences, Japanese culture, friendship.
- Correct mistakes with a brief explanation: "Good! 'I went' is past tense here — 'I go' is present 😊"
- Keep your reply under 100 words.`,
        3: `You are Alex, a warm English coach for Makoto, a Japanese high school freshman (age ~15).
LEVEL 3 — Intermediate:
- Speak more naturally, like a real conversation.
- Topics: cultural differences, study abroad tips, handling misunderstandings, future dreams.
- Point out subtle mistakes and explain nuance.
- Keep your reply under 120 words.`
    };

    return levels[level] + `

YOUR RULES (all levels):
- Always end with ONE question to keep the conversation going.
- Be genuinely curious and encouraging — celebrate small wins.
- Use Japanese only when truly necessary for clarity: "(日本語: ...)".
- Goal: help Makoto feel confident speaking English before going abroad.`;
}

// ── Init ───────────────────────────────────────────────────────────────────
window.onload = () => {
    updateLevelBadge();
    if (!apiKey) {
        openSettings();
    } else {
        kickstart();
    }
};

async function kickstart() {
    document.getElementById('welcomeMsg')?.remove();
    await sendToAI('Hello! Let\'s start today\'s English practice.');
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function updateLevelBadge() {
    document.getElementById('levelBadge').textContent = `Level ${level}`;
}

function openSettings() {
    document.getElementById('apiKeyInput').value = apiKey;
    document.getElementById('levelSelect').value = String(level);
    document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
    document.getElementById('settingsModal').classList.remove('open');
}

function saveSettings() {
    const k = document.getElementById('apiKeyInput').value.trim();
    const l = parseInt(document.getElementById('levelSelect').value);
    if (!k) { alert('Please enter your API key.'); return; }
    apiKey = k;
    level  = l;
    localStorage.setItem('eng_coach_key', k);
    localStorage.setItem('eng_coach_level', String(l));
    updateLevelBadge();
    closeSettings();
    if (history.length === 0) kickstart();
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

let autoSendTimer = null;
function handleInput(el) {
    autoResize(el);
    // 音声入力（キーボードマイク）で入力が止まったら1.2秒後に自動送信
    clearTimeout(autoSendTimer);
    if (el.value.trim().length > 0) {
        autoSendTimer = setTimeout(() => {
            // テキストが増えていなければ送信（話し終わり検出）
            const val = el.value.trim();
            if (val.length > 0) sendMessage();
        }, 1200);
    }
}

function addMessage(role, text) {
    document.getElementById('welcomeMsg')?.remove();
    const chat = document.getElementById('chat');
    const wrap = document.createElement('div');
    wrap.className = `message ${role === 'user' ? 'user' : 'ai'}`;

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = role === 'user' ? 'Makoto' : 'Alex';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    const chat = document.getElementById('chat');
    const wrap = document.createElement('div');
    wrap.className = 'message ai'; wrap.id = 'typing';

    const s = document.createElement('div'); s.className = 'sender'; s.textContent = 'Alex';
    const b = document.createElement('div'); b.className = 'bubble typing';
    b.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(s); wrap.appendChild(b);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
}

function hideTyping() { document.getElementById('typing')?.remove(); }

// ── API ────────────────────────────────────────────────────────────────────
async function sendMessage() {
    const input = document.getElementById('userInput');
    const text  = input.value.trim();
    if (!text || !apiKey) { if (!apiKey) openSettings(); return; }

    input.value = '';
    input.style.height = 'auto';

    addMessage('user', text);
    history.push({ role: 'user', parts: [{ text }] });
    msgCount++;

    // Auto level-up suggestion every 20 messages
    if (msgCount > 0 && msgCount % 20 === 0 && level < 3) {
        setTimeout(() => {
            if (confirm(`You've had ${msgCount} conversations! Ready to move up to Level ${level + 1}?`)) {
                level++;
                localStorage.setItem('eng_coach_level', String(level));
                updateLevelBadge();
                addMessage('ai', `Great — you've leveled up to Level ${level}! I'll start using a bit more natural English. You've got this! 🎉`);
            }
        }, 500);
        return;
    }

    await sendToAI();
}

async function sendToAI(trigger) {
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    const contents = trigger
        ? [{ role: 'user', parts: [{ text: trigger }] }]
        : history;

    try {
        // Groq API (OpenAI-compatible)
        const messages = [
            { role: 'system', content: buildSystemPrompt() },
            ...contents.map(c => ({
                role: c.role === 'model' ? 'assistant' : 'user',
                content: c.parts[0].text
            }))
        ];

        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages,
                temperature: 0.85,
                max_tokens: 300
            })
        });

        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error?.message || `HTTP ${res.status}`);
        }

        const data   = await res.json();
        const aiText = data.choices[0].message.content.trim();

        hideTyping();
        addMessage('ai', aiText);

        if (trigger) history.push({ role: 'user', parts: [{ text: trigger }] });
        history.push({ role: 'model', parts: [{ text: aiText }] });

        // Keep history manageable (last 30 turns)
        if (history.length > 60) history = history.slice(history.length - 60);

    } catch (err) {
        hideTyping();
        addMessage('ai', `⚠️ Error: ${err.message}`);
        console.error(err);
    }

    document.getElementById('sendBtn').disabled = false;
}

// ── Voice input ────────────────────────────────────────────────────────────
function toggleMic() {
    if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
        alert('Voice input needs Chrome or Safari.');
        return;
    }

    if (isListening) { recognition.stop(); return; }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        const btn = document.getElementById('micBtn');
        btn.classList.add('listening');
        btn.textContent = '⏹';
    };

    recognition.onresult = (e) => {
        const t = e.results[0][0].transcript;
        const input = document.getElementById('userInput');
        input.value = t;
        autoResize(input);
    };

    recognition.onend = () => {
        isListening = false;
        const btn = document.getElementById('micBtn');
        btn.classList.remove('listening');
        btn.textContent = '🎤';
    };

    recognition.onerror = (e) => {
        console.error('Speech error:', e.error);
        isListening = false;
        const btn = document.getElementById('micBtn');
        btn.classList.remove('listening');
        btn.textContent = '🎤';
    };

    recognition.start();
}
</script>
</body>
</html>
